<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="csrf-token" content="{{ frappe.session.csrf_token }}">
  <title>Public Quiz Attempt v3.0.7</title>

  <script>
    // Force page reload if version mismatch
    if (localStorage.getItem("quizVersion") !== "3.0.7") {
      localStorage.setItem("quizVersion", "3.0.7");
      if (window.location.search.indexOf("v=") === -1) {
        window.location.href =
          window.location.href + (window.location.search ? "&" : "?") + "v=3.0.7";
      }
    }
  </script>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>

  <!-- ✅ Awesomplete (Frappe-like link field typeahead) -->

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Newsreader:wght@400;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap");

    :root {
      --ink: #14212f;
      --muted: #5b6776;
      --paper: #f5f1ea;
      --panel: #ffffff;
      --accent: #f36a3d;
      --accent-dark: #c9532a;
      --mint: #2b7a78;
      --shadow: 0 18px 45px rgba(20, 33, 47, 0.14);
    }

    body {
      background:
        radial-gradient(1200px 600px at 5% -10%, #fde2c6 0%, rgba(253, 226, 198, 0) 65%),
        radial-gradient(1000px 500px at 90% 0%, #cbe9e4 0%, rgba(203, 233, 228, 0) 60%),
        linear-gradient(180deg, #f6f2ec 0%, #eef3f5 100%);
      min-height: 100vh;
      font-family: "Space Grotesk", "Newsreader", sans-serif;
      color: var(--ink);
    }

    .quiz-container {
      background: var(--panel);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
      border: 1px solid rgba(20, 33, 47, 0.08);
      animation: liftIn 0.5s ease;
    }

    .header-section {
      position: relative;
      background: linear-gradient(135deg, #1b2838 0%, #2f4860 100%);
      color: #ffffff;
      padding: 2.5rem 2rem 2rem;
      text-align: center;
      font-family: "Newsreader", serif;
    }

    .header-section::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(300px 200px at 20% 20%, rgba(243, 106, 61, 0.35), transparent 60%),
        radial-gradient(260px 200px at 80% 10%, rgba(43, 122, 120, 0.35), transparent 60%);
      opacity: 0.65;
      pointer-events: none;
    }

    .header-section h2 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -0.02em;
      position: relative;
      z-index: 1;
    }

    .brand-logo {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: #ffffff;
      padding: 8px;
      box-shadow: 0 12px 24px rgba(20, 33, 47, 0.25);
      object-fit: contain;
      position: relative;
      z-index: 1;
      margin-bottom: 12px;
    }

    .header-section p {
      color: rgba(255, 255, 255, 0.8);
      position: relative;
      z-index: 1;
    }

    .language-switch {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
      min-width: 170px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.35);
      background: rgba(255,255,255,0.92);
      color: #1b2838;
      font-weight: 600;
      font-size: 14px;
      padding: 6px 10px;
    }

    .quiz-form {
      padding: 2rem;
      background: linear-gradient(180deg, #ffffff 0%, #fdfbf8 100%);
    }

    /* input look */
    .form-control {
      border-radius: 12px;
      border: 2px solid #e6e1d7;
      padding: 12px 15px;
      font-size: 16px;
      transition: all 0.2s ease;
      background: #fffdf9;
    }
    .form-control:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 0.2rem rgba(243, 106, 61, 0.2);
    }

    .btn-primary {
      background: linear-gradient(135deg, #f36a3d 0%, #d8582a 100%);
      border: none;
      border-radius: 12px;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: 600;
      color: white;
      transition: all 0.3s ease;
      letter-spacing: 0.01em;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(243, 106, 61, 0.35);
    }

    .btn-secondary {
      background: #eef1f4;
      border: 1px solid #d6dde3;
      color: var(--ink);
      border-radius: 12px;
      padding: 10px 22px;
      font-weight: 600;
      transition: all 0.2s ease;
    }
    .btn-secondary:hover {
      background: #e5eaef;
      transform: translateY(-1px);
    }

    .quiz-list {
      background: #f8f4ec;
      border-radius: 14px;
      padding: 1.5rem;
      margin-top: 1rem;
      border: 1px solid rgba(20, 33, 47, 0.08);
    }
    .quiz-item {
      background: white;
      border-radius: 14px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      border: 1px solid #ece6dc;
      transition: all 0.3s ease;
    }
    .quiz-item:hover {
      box-shadow: 0 10px 20px rgba(20, 33, 47, 0.12);
      transform: translateY(-2px);
    }
    .quiz-title {
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.5rem;
      font-family: "Newsreader", serif;
      font-size: 20px;
    }
    .quiz-details { color: var(--muted); font-size: 14px; }

    .btn-attempt {
      background: linear-gradient(135deg, #2b7a78 0%, #206460 100%);
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      color: white;
      transition: all 0.3s ease;
    }
    .btn-attempt:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(43, 122, 120, 0.35);
    }

    .loading { display: none; }
    .spinner-border-sm { width: 1rem; height: 1rem; }

    .error-message {
      background: #ffe4de;
      color: #8a2b1d;
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1rem;
      display: none;
      border: 1px solid rgba(243, 106, 61, 0.3);
    }
    .success-message {
      background: #e0f2f1;
      color: #1d5450;
      padding: 1rem;
      border-radius: 12px;
      margin-top: 1rem;
      display: none;
      border: 1px solid rgba(43, 122, 120, 0.3);
    }

    .no-quizzes {
      text-align: center;
      color: var(--muted);
      padding: 2rem;
    }

    .question-card {
      background: #ffffff;
      border: 1px solid #ece6dc;
      border-radius: 16px;
      box-shadow: 0 10px 24px rgba(20, 33, 47, 0.08);
    }

    .question-title {
      font-size: 16px;
      color: var(--ink);
    }

    .option-item {
      border: 1px solid #ece6dc;
      border-radius: 12px;
      transition: all 0.2s ease;
      background: #fffdf9;
    }

    .option-item.selected {
      border-color: var(--accent);
      background: #fff1ea;
      box-shadow: 0 6px 16px rgba(243, 106, 61, 0.18);
    }

    .badge.bg-primary {
      background-color: var(--accent) !important;
      color: #fff;
    }

    .quiz-info-row {
      background: #f7f1e7;
      border-radius: 16px;
      border: 1px solid #ece6dc;
    }

    .question-progress {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      background: #f6efe4;
      border-radius: 12px;
      padding: 10px 14px;
      border: 1px solid #ece6dc;
      font-weight: 600;
      color: var(--ink);
    }

    .question-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-top: 18px;
    }

    .review-card,
    .history-card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #ece6dc;
      box-shadow: 0 10px 24px rgba(20, 33, 47, 0.08);
      padding: 1.25rem;
      margin-bottom: 1.25rem;
    }

    .review-item {
      border-bottom: 1px solid #f0e8dd;
      padding: 0.75rem 0;
    }

    .review-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .answer-pill {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e8f3f2;
      color: #1d5450;
      font-size: 12px;
      font-weight: 600;
    }

    .answer-pill.unanswered {
      background: #ffe4de;
      color: #8a2b1d;
    }

    .history-item {
      border-bottom: 1px dashed #e2d8c8;
      padding: 0.75rem 0;
    }

    .history-item:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .result-card {
      background: #ffffff;
      border-radius: 18px;
      border: 1px solid #ece6dc;
      box-shadow: 0 12px 28px rgba(20, 33, 47, 0.12);
    }

    @keyframes liftIn {
      from {
        transform: translateY(18px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    /* ✅ Awesomplete dropdown styling to look like Frappe */
    .awesomplete {
      width: 100%;
      display: block;
    }
    .awesomplete > ul {
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.12);
      max-height: 260px;
      overflow: auto;
      margin-top: 6px;
      padding: 6px;
      background: #fff;
      z-index: 9999;
    }
    .awesomplete > ul > li {
      border-radius: 8px;
      padding: 10px 10px;
      font-size: 14px;
    }
    .awesomplete > ul > li[aria-selected="true"] {
      background: #eef2ff;
      color: #111827;
    }

    /* small helper text like frappe "type to search" */
    .hint {
      font-size: 12px;
      color: #6b7280;
      margin-top: 6px;
    }
  </style>
</head>

<body>
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-10 col-lg-8">
        <div class="quiz-container" id="mainQuizContainer">
          <div class="header-section">
            <select id="languageSelect" class="language-switch" aria-label="Language Selector">
              <option value="en">English</option>
              <option value="hi">हिन्दी (Hindi)</option>
              <option value="zh">中文 (Chinese)</option>
              <option value="ar">العربية (Arabic)</option>
              <option value="ur">اردو (Urdu)</option>
            </select>
            <img class="brand-logo" src="https://erp.nutc.cloud/files/nutclogo.jpg" alt="NUTC Logo">
            <h2 class="mb-0" id="headerTitle">Public Quiz Attempt</h2>
            <p class="mb-0" id="headerSubtitle">Select your student group and student to attempt quizzes</p>
          </div>

          <div class="quiz-form" id="quizForm">
            <form id="studentSelectionForm" novalidate>
              <!-- Filter Section -->
              <div class="row mb-4">
                <div class="col-12">
                  <h5 class="mb-3"><i class="fas fa-filter me-2"></i><span id="filterOptionsTitle">Filter Options</span></h5>
                </div>

                <!-- Academic Year (Frappe-like Link Field UI) -->
                <div class="col-md-3 mb-3">
                  <label class="form-label">
                    <i class="fas fa-calendar-alt me-2"></i><span id="academicYearLabel">Academic Year</span>
                  </label>
                  <input type="text" class="form-control" id="academicYearTxt" placeholder="All Academic Years" autocomplete="off">
                  <input type="hidden" id="academicYearVal" value="">
                  <div class="hint" id="hintAcademicYear">Type to search</div>
                </div>

                <!-- Course -->
                <div class="col-md-3 mb-3">
                  <label class="form-label">
                    <i class="fas fa-graduation-cap me-2"></i><span id="courseLabel">Course</span>
                  </label>
                  <input type="text" class="form-control" id="courseTxt" placeholder="All Courses" autocomplete="off">
                  <input type="hidden" id="courseVal" value="">
                  <div class="hint" id="hintCourse">Type to search</div>
                </div>

                <div class="col-md-3 mb-3">
                  <label for="fromDate" class="form-label">
                    <i class="fas fa-calendar me-2"></i><span id="fromDateLabel">From Date</span>
                  </label>
                  <input type="date" class="form-control" id="fromDate">
                </div>

                <div class="col-md-3 mb-3">
                  <label for="toDate" class="form-label">
                    <i class="fas fa-calendar me-2"></i><span id="toDateLabel">To Date</span>
                  </label>
                  <input type="date" class="form-control" id="toDate">
                </div>
              </div>

              <!-- Student Selection -->
              <div class="row mb-4">
                <div class="col-12">
                  <h5 class="mb-3"><i class="fas fa-users me-2"></i><span id="studentSelectionTitle">Student Selection</span></h5>
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">
                    <i class="fas fa-users me-2"></i><span id="studentGroupLabel">Student Group</span>
                  </label>
                  <input type="text" class="form-control" id="studentGroupTxt" placeholder="Select Student Group" autocomplete="off" disabled>
                  <input type="hidden" id="studentGroupVal" value="">
                  <div class="hint" id="hintStudentGroup">Type to search</div>
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label">
                    <i class="fas fa-user me-2"></i><span id="studentLabel">Student</span>
                  </label>
                  <input type="text" class="form-control" id="studentTxt" placeholder="Select Student" autocomplete="off" disabled>
                  <input type="hidden" id="studentVal" value="">
                  <div class="hint" id="hintStudent">Type to search</div>
                </div>
              </div>

              <div class="d-grid">
                <button type="submit" class="btn btn-primary" id="loadQuizzesBtn">
                  <span class="btn-text"><i class="fas fa-search me-2"></i><span id="loadAvailableQuizzesText">Load Available Quizzes</span></span>
                  <span class="loading"><span class="spinner-border spinner-border-sm me-2"></span><span id="loadBtnLoadingText">Loading...</span></span>
                </button>
              </div>
            </form>

            <div class="error-message" id="errorMessage">
              <i class="fas fa-exclamation-triangle me-2"></i>
              <span id="errorText"></span>
            </div>

            <div class="success-message" id="successMessage">
              <i class="fas fa-check-circle me-2"></i>
              <span id="successText"></span>
            </div>

            <div class="quiz-list" id="quizList" style="display:none;">
              <h5 class="mb-3"><i class="fas fa-list me-2"></i><span id="availableQuizzesTitle">Available Quizzes</span></h5>
              <div id="quizItems"></div>
            </div>

            <div class="no-quizzes" id="noQuizzes" style="display:none;">
              <i class="fas fa-info-circle fa-2x mb-3"></i>
              <p id="noQuizzesText">No quizzes available for the selected student group and student.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  function sendQuizAuditEvent(eventType, quizName, student, studentGroup, details = {}) {
    const attemptId = getAttemptId();
    if (!eventType || !attemptId) return;

    const payload = new URLSearchParams();
    payload.append("event_type", eventType);
    payload.append("quiz_name", quizName || "");
    payload.append("student", student || "");
    payload.append("student_group", studentGroup || "");
    payload.append("attempt_id", attemptId);
    payload.append("details", JSON.stringify(details || {}));

    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute("content");
    const headers = {
      "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
      "Accept": "application/json"
    };
    if (csrfToken) {
      headers["X-Frappe-CSRF-Token"] = csrfToken;
    }

    fetch("/api/method/numerouno.numerouno.api.quiz_api.log_public_quiz_audit", {
      method: "POST",
      headers,
      body: payload.toString(),
      keepalive: true
    }).catch((err) => {
      debugLog("quiz-audit:failed", { eventType, err: String(err) });
    });
  }

  function logQuizAttemptStarted(quizData, quizName, student, studentGroup) {
    const attemptId = getAttemptId();
    if (!attemptId) return;

    const startedKey = getAuditStartedKey(attemptId);
    if (sessionStorage.getItem(startedKey)) return;

    sessionStorage.setItem(startedKey, "1");
    sendQuizAuditEvent("attempt_started", quizName, student, studentGroup, {
      question_count: (quizData?.questions || []).length
    });
  }

  function saveAutosaveState() {
    if (!quizAttemptState) return;
    const { quizName, student, studentGroup, currentIndex, answers } = quizAttemptState;
    if (!quizName || !student || !studentGroup) return;
    const payload = {
      quizName,
      student,
      studentGroup,
      attemptId: getAttemptId(),
      currentIndex,
      answers,
      savedAt: new Date().toISOString(),
      version: VERSION
    };
    try {
      localStorage.setItem(getAutosaveKey(quizName, student, studentGroup), JSON.stringify(payload));
    } catch (err) {
      debugLog("autosave:failed", err);
    }
  }

  function clearAutosaveState(quizName, student, studentGroup) {
    if (!quizName || !student || !studentGroup) return;
    localStorage.removeItem(getAutosaveKey(quizName, student, studentGroup));
  }

  function restoreAutosaveState(quizData, quizName, student, studentGroup) {
    if (!quizName || !student || !studentGroup) return null;
    const raw = localStorage.getItem(getAutosaveKey(quizName, student, studentGroup));
    if (!raw) return null;
    try {
      const parsed = JSON.parse(raw);
      if (!parsed || parsed.quizName !== quizName || parsed.student !== student || parsed.studentGroup !== studentGroup) {
        return null;
      }
      const questionNames = new Set((quizData.questions || []).map((q) => q.name));
      const restoredAnswers = {};
      Object.entries(parsed.answers || {}).forEach(([qName, answer]) => {
        if (questionNames.has(qName)) {
          restoredAnswers[qName] = answer;
        }
      });
      const maxIndex = Math.max(0, (quizData.questions || []).length - 1);
      const restoredIndex = Math.min(Math.max(Number(parsed.currentIndex) || 0, 0), maxIndex);
      return {
        answers: restoredAnswers,
        currentIndex: restoredIndex,
        attemptId: parsed.attemptId || null
      };
    } catch (err) {
      debugLog("autosave:restore failed", err);
      return null;
    }
  }

    if (optionId === null || optionId === undefined) return null;
    const asNumber = Number(optionId);
    return Number.isNaN(asNumber) ? String(optionId) : asNumber;

  function isSameOptionId(a, b) {
    if (a === null || a === undefined || b === null || b === undefined) return false;
    return String(a) === String(b);
  }

  // ====== Frappe-like Link Field (Awesomplete) ======
  function makeLinkField({ txtId, valId, placeholder, getItems, onSelect }) {
    const txtEl = document.getElementById(txtId);
    const valEl = document.getElementById(valId);

    txtEl.setAttribute("placeholder", placeholder || "");

    const lf = {
      txtEl,
      valEl,
      lastItems: [],
      aw: null,
      setList(items) {
        lf.lastItems = items || [];
        lf.aw.list = lf.lastItems.map(x => x.label);
      },
      clear() {
        txtEl.value = "";
        valEl.value = "";
      },
      setDisabled(disabled) {
        txtEl.disabled = !!disabled;
      }
    };

    lf.aw = new Awesomplete(txtEl, {
      minChars: 0,
      autoFirst: true,
      maxItems: 50
    });

    const refresh = debounce(async () => {
      const q = txtEl.value || "";
      const items = await getItems(q);
      lf.setList(items);
      lf.aw.evaluate(); // open dropdown
    }, 200);

    txtEl.addEventListener("input", refresh);
    txtEl.addEventListener("focus", refresh);
    txtEl.addEventListener("click", refresh);


    txtEl.addEventListener("awesomplete-selectcomplete", (evt) => {
      const selectedLabel = evt?.text?.value || txtEl.value;

      const found = lf.lastItems.find(x => x.label === selectedLabel);
      if (found) {
        txtEl.value = found.label;
        valEl.value = found.value;
      } else {
        valEl.value = "";
      }

      if (typeof onSelect === "function") {
        onSelect({ label: txtEl.value, value: valEl.value });
      }
    });

    // If user types random text and leaves, clear value (like frappe)
    txtEl.addEventListener("blur", () => {
      const exact = lf.lastItems.find(x => x.label === txtEl.value);
      if (!exact && txtEl.value) {
        // user typed something not selected
        valEl.value = "";
      }
    });

    return lf;
  }

  async function fetchStudentGroupsFiltered() {
    const academicYear = document.getElementById("academicYearVal").value;
    const course = document.getElementById("courseVal").value;
    const fromDate = document.getElementById("fromDate").value;
    const toDate = document.getElementById("toDate").value;

    const params = new URLSearchParams();
    if (academicYear) params.append("academic_year", academicYear);
    if (course) params.append("course", course);
    if (fromDate) params.append("from_date", fromDate);
    if (toDate) params.append("to_date", toDate);
    if (params.toString()) url += "?" + params.toString();

    const res = await fetch(url);
    const data = await res.json();
    if (data.message?.status !== "success") return [];

    return (data.message.student_groups || []).map(g => ({
      value: g.name,
      label: `${g.student_group_name} (${g.course})`,
      student_group_name: g.student_group_name || g.name,
      course_name: g.course || "",
      from_date: g.from_date || "",
      to_date: g.to_date || ""
    }));
  }

    const params = new URLSearchParams();
    params.append("student_group", studentGroup);
    params.append("student", student);
    const url =
      `/api/method/numerouno.numerouno.api.quiz_api.get_course_evaluation_prefill?${params.toString()}`;
    const res = await fetch(url, { method: "GET" });
    const data = await res.json();
    if (data.message?.status !== "success") return {};
    return data.message.data || {};

  function buildCourseEvaluationUrl(prefill) {
    const params = new URLSearchParams();
    [
      "course_name",
      "company",
      "instructor_name",
      "dates",
      "trainee_name",
      "email_id",
      "trainee_mobile",
      "student_group"
    ].forEach((field) => {
      const value = prefill[field];
      if (value) params.append(field, value);
    });
    const qs = params.toString();
    return qs ? `${COURSE_EVALUATION_URL}?${qs}` : COURSE_EVALUATION_URL;
  }

async function reloadStudentGroups() {
  showLoading(true);
  hideMessages();

  // reset dependent fields
  studentGroupLF.clear();
  studentLF.clear();
  document.getElementById("studentTxt").disabled = true;
  studentsData = [];

  try {
    studentGroupsData = await fetchStudentGroupsFiltered();
    showLoading(false);

    // ✅ Always enable student group (even if filters empty)
    document.getElementById("studentGroupTxt").disabled = false;

    if (studentGroupsData.length) {
      showSuccess(t("student_groups_loaded"));
    } else {
      showError(t("no_student_groups"));
    }
  } catch (e) {
    showLoading(false);
    document.getElementById("studentGroupTxt").disabled = false;
    showError(t("error_loading_student_groups"));
    console.error(e);
  }
}

  async function applyPreselectIfAny() {
    if (!preselectParams) return;

    const { studentGroup, studentGroupLabel, student, studentName, autoStart } = preselectParams;
    if (studentGroup) {
      const groupMatch = studentGroupsData.find((x) => x.value === studentGroup);
      document.getElementById("studentGroupTxt").value =
        studentGroupLabel || groupMatch?.label || studentGroup;
      document.getElementById("studentGroupVal").value = studentGroup;
      await reloadStudents(studentGroup);
    }

    if (student) {
      const studentMatch = studentsData.find((x) => x.value === student);
      document.getElementById("studentTxt").value =
        studentName || studentMatch?.label || student;
      document.getElementById("studentVal").value = student;
      document.getElementById("studentTxt").disabled = false;
    }

    if (autoStart && studentGroup && student) {
      loadQuizzes();
    }

    preselectParams = null;
  }


  async function reloadStudents(studentGroupName) {
    if (!studentGroupName) return;

    showLoading(true);
    hideMessages();

    studentLF.clear();
    studentsData = [];
    document.getElementById("studentTxt").disabled = true;

    try {
      studentsData = await fetchStudentsByGroup(studentGroupName);
      showLoading(false);

      if (studentsData.length) {
        document.getElementById("studentTxt").disabled = false;
        showSuccess(t("students_loaded"));
      } else {
        showError(t("no_students"));
      }
    } catch (e) {
      showLoading(false);
      showError(t("error_loading_students"));
      console.error(e);
    }
  }

  // ====== quizzes ======
  function loadQuizzes() {
    const studentGroup = document.getElementById("studentGroupVal").value;
    const student = document.getElementById("studentVal").value;

    if (!studentGroup || !student) {
      showError(t("select_group_student_suggestions"));
      return;
    }

    showLoading(true);
    hideMessages();

    const url =
      `/api/method/numerouno.numerouno.api.quiz_api.get_available_quizzes_from_mcqs` +
      `?student_group=${encodeURIComponent(studentGroup)}&student=${encodeURIComponent(student)}`;

    debugLog("LOADING QUIZZES", { studentGroup, student, url });
    
    fetch(url, { method: "GET", headers: { "Content-Type": "application/json" } })
      .then((r) => r.json())
      .then((data) => {
        showLoading(false);
        debugLog("QUIZ API RESPONSE", data);
        
        if (data.message?.status === "success") {
          const quizzes = data.message.quizzes || [];
          const debugInfo = data.message.debug_info || {};
          
          debugLog("Quizzes found", quizzes.length, debugInfo);
          
          if (quizzes.length === 0) {
            const debugMsg = data.message.debug || t("no_quizzes");
            const debugDetails = data.message.debug_details || {};
            
            debugLog("NO QUIZZES FOUND", debugMsg, debugDetails);
            
            let errorMsg = `${debugMsg}. `;
            if (debugDetails.quiz_names_from_mcqs && debugDetails.quiz_names_from_mcqs.length > 0) {
              errorMsg += `Quiz names found in MCQS Assignment: ${debugDetails.quiz_names_from_mcqs.join(", ")}. `;
            }
            if (debugDetails.assignments_found !== undefined) {
              errorMsg += `MCQS Assignments found: ${debugDetails.assignments_found}. `;
            }
            errorMsg += `Please check that MCQS Assignment exists for student group: ${studentGroup} and has quizzes linked.`;
            
            showError(errorMsg);
          } else {
            debugLog("Quizzes to display", quizzes);
            displayQuizzes(quizzes);
            showSuccess(t("quizzes_loaded_success"));
          }
        } else {
          const errorMsg = data.message?.message || data.message?.debug || t("failed_load_quizzes");
          debugLog("API Error", errorMsg, data.message);
          showError(errorMsg);
        }
      })
      .catch((err) => {
        showLoading(false);
        console.error("Fetch error while loading quizzes:", err);
        showError(t("error_loading_quizzes"));
      });
  }

  // ====== Quiz Attempt Flow ======
  function attemptQuiz(quizName, quizTitle) {
    const studentGroup = document.getElementById("studentGroupVal").value;
    const student = document.getElementById("studentVal").value;
    const studentName = document.getElementById("studentTxt").value || student;

  function loadQuizForAttempt(quizName, quizTitle, student, studentGroup, studentName, studentGroupLabel) {
    if (quizAttemptLoading) {
      return;
    }
    quizAttemptLoading = true;
    showLoading(true);
    hideMessages();

    const url = `/api/method/numerouno.numerouno.api.quiz_api.get_quiz_questions_from_quiz?quiz_name=${encodeURIComponent(quizName)}&lang=${encodeURIComponent(currentLang)}`;
    
    fetch(url, {
      method: "GET",
      headers: { "Content-Type": "application/json" }
    })
      .then((r) => r.json())
      .then((data) => {
        showLoading(false);
        debugLog("QUIZ QUESTIONS API RESPONSE", {
          status: data.message?.status,
          questions: data.message?.questions?.length || 0
        });
        if (data.message?.status === "success") {
          displayQuizForAttempt(data.message, quizName, student, studentGroup, studentName, studentGroupLabel);

          showError(data.message?.message || t("failed_to_load_quiz"));

        quizAttemptLoading = false;

        showLoading(false);
        showError(t("error_loading_quiz"));

  function renderQuestionView() {
    if (!quizAttemptState) return;
    const { quizData, currentIndex } = quizAttemptState;

    const question = questions[currentIndex];
    const progress = document.getElementById("questionProgress");
    const stage = document.getElementById("questionStage");
    const nav = document.getElementById("navStage");

    if (!question || !stage || !nav || !progress) return;

    const answeredCount = questions.filter((q) => !!getAnswer(q.name)).length;
    progress.innerHTML = `
      <span>${t("question_of", { current: currentIndex + 1, total: questions.length })}</span>
      <span>${t("answered_count", { answered: answeredCount, total: questions.length })}</span>
    `;

    stage.innerHTML = `
      <div class="question-card mb-4 p-3">
        <div class="question-title mb-3">
          <strong>${t("question_label", { number: currentIndex + 1 })}</strong> ${question.question}
          <span class="badge bg-primary ms-2">${question.marks} ${question.marks > 1 ? t("marks") : t("mark")}</span>

          ${question.options.map(option => `
            <div class="option-item mb-2 p-2 cursor-pointer ${isSameOptionId(selectedId, option.id) ? "selected" : ""}" data-option="${option.id}" style="cursor: pointer;">
              <input type="radio" name="question_${question.name}" value="${option.id}" id="q${question.name}_${option.id}" ${isSameOptionId(selectedId, option.id) ? "checked" : ""}>

            </div>
          `).join("")}
        </div>
      </div>
    `;

    stage.querySelectorAll(".option-item").forEach((item) => {
      item.addEventListener("click", function() {
        const questionName = this.closest(".options").dataset.question;
        const optionId = normalizeOptionId(this.dataset.option);
        setAnswer(questionName, optionId);

        this.closest(".options").querySelectorAll(".option-item").forEach((opt) => {
          opt.classList.remove("selected");
          opt.querySelector('input[type="radio"]').checked = false;
        });

        this.classList.add("selected");
        this.querySelector('input[type="radio"]').checked = true;
      });
    });

    const isFirst = currentIndex === 0;
    const isLast = currentIndex === questions.length - 1;

    nav.innerHTML = `
      <div class="question-nav">
        <button type="button" class="btn btn-secondary" id="prevQuestionBtn" ${isFirst ? "disabled" : ""}>
          <i class="fas fa-arrow-left me-2"></i>${t("previous")}
        </button>
        <button type="button" class="btn btn-primary" id="nextQuestionBtn">
          ${isLast ? `<i class="fas fa-clipboard-list me-2"></i>${t("review_answers")}` : `<i class="fas fa-arrow-right me-2"></i>${t("next")}`}
        </button>
        <button type="button" class="btn btn-secondary" id="reviewAnswersBtn">
          <i class="fas fa-eye me-2"></i>${t("review")}
        </button>
      </div>
    `;

    const prevBtn = document.getElementById("prevQuestionBtn");
    const nextBtn = document.getElementById("nextQuestionBtn");
    const reviewBtn = document.getElementById("reviewAnswersBtn");

    if (prevBtn) {
      prevBtn.addEventListener("click", () => {
        if (quizAttemptState.currentIndex > 0) {
          quizAttemptState.currentIndex -= 1;
          saveAutosaveState();
          renderQuestionView();
        }
      });
    }

    if (nextBtn) {
      nextBtn.addEventListener("click", () => {
        const selected = getAnswer(question.name);
        if (!selected) {
          showError(t("select_answer_before_continue"));
          return;
        }
        hideMessages();
        if (isLast) {
          renderReviewView();
        } else {
          quizAttemptState.currentIndex += 1;
          saveAutosaveState();
          renderQuestionView();
        }
      });
    }

    if (reviewBtn) {
      reviewBtn.addEventListener("click", () => {
        saveAutosaveState();
        renderReviewView();
      });
    }

    saveAutosaveState();
  }

  function submitQuiz(quizData, quizName, student, studentGroup) {
    const submitBtn = document.getElementById("submitQuizBtn");
    if (submitBtn && submitBtn.disabled) {
      return;
    }
    // Collect answers
    const answers = {};
    (quizData.questions || []).forEach((question) => {
      const selected = getAnswer(question.name);
      answers[question.name] = selected ? [selected] : [];
    });

    // Check if all questions are answered
    const unansweredQuestions = Object.keys(answers).filter((q) => answers[q].length === 0);
    if (unansweredQuestions.length > 0) {
      showError(t("please_answer_all", { count: unansweredQuestions.length }));
      return;
    }

    // Prepare submission data
    const submissionAnswers = quizData.questions.map((question) => {
      const answer = answers[question.name] || [];
      return {
        question: question.name,
        answers: answer,
        marks: question.marks
      };
    });

    showLoading(true);
    hideMessages();
    setSubmitLoading(true);

    // Submit quiz - Use POST to avoid URL length limits
    debugLog("SUBMITTING QUIZ", {
      quizName,
      student,
      studentGroup,
      answerCount: submissionAnswers.length
    });
    
    // Build payload (POST to avoid 414 URI too long)
    const params = new URLSearchParams();
    params.append("quiz_name", quizName);
    params.append("student", student);
    params.append("student_group", studentGroup);
    params.append("attempt_id", getAttemptId());
    params.append("answers", JSON.stringify(submissionAnswers));

    sendQuizAuditEvent("submit_clicked", quizName, student, studentGroup, {
      answer_count: submissionAnswers.length
    });
    
    const url = "/api/method/numerouno.numerouno.api.quiz_api.submit_quiz_from_mcqs";
    
    debugLog("Submitting quiz via POST", url);
    
    const csrfToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
    const headers = {
      "Content-Type": "application/x-www-form-urlencoded; charset=UTF-8",
      "Accept": "application/json"
    };
    if (csrfToken) {
      headers["X-Frappe-CSRF-Token"] = csrfToken;
    }

    fetch(url, {
      method: "POST",
      headers,
      body: params.toString()
    })
      .then((r) => {
        if (!r.ok) {
          throw new Error(`HTTP error! status: ${r.status}`);
        }
        return r.json();
      })
      .then((data) => {
        showLoading(false);
        debugLog("Submission response", data);
        if (data.message?.status === "success") {
          const result = data.message;
          if (!result.activity_id) {
            const missingActivityReason = result.activity_error
              ? ` ${result.activity_error}`
              : "";
            showError(`Quiz submission could not be finalized because Quiz Activity was not created.${missingActivityReason}`);
            setSubmitLoading(false);
            return;
          }
          clearAutosaveState(quizName, student, studentGroup);
          showSuccess(
            t("quiz_submit_success", {
              score: result.score,
              percentage: result.percentage.toFixed(1),
              result: result.passed ? t("passed") : t("failed")
            })
          );
          if (!result.assessment_result_id) {
            const activityRef = result.activity_id ? ` Quiz Activity: ${result.activity_id}.` : "";
            const backendError = result.assessment_result_error ? ` Reason: ${result.assessment_result_error}` : "";
            showError(t("assessment_not_created", { activity: activityRef, reason: backendError }));
          }
          showQuizResult(result);

          setTimeout(() => {
            redirectToCourseEvaluation(studentGroup, student);
          }, 900);
        } else {
          showError(data.message?.message || t("failed_submit_quiz"));
          setSubmitLoading(false);
        }
      })
      .catch((err) => {
        showLoading(false);
        console.error("Error submitting quiz:", err);
        showError(t("error_submit_quiz"));
        setSubmitLoading(false);
      });
  }

  function goBackToQuizList() {
    // Remove any duplicate quiz containers
    document.querySelectorAll("#quizAttemptContainer").forEach((node) => node.remove());

    quizAttemptState = null;
    quizAttemptLoading = false;

    const mainContainer = document.getElementById("mainQuizContainer");
    if (mainContainer) {
      mainContainer.style.display = "block";
    }
    
    // Show form and quiz list again
    document.getElementById("quizForm").style.display = "block";
    if (document.getElementById("quizList").style.display !== "none") {
      document.getElementById("quizList").style.display = "block";
    }
  }

  function setSubmitLoading(isLoading) {
    const submitBtn = document.getElementById("submitQuizBtn");
    if (!submitBtn) return;
    const submitText = submitBtn.querySelector(".submit-text");
    const loading = submitBtn.querySelector(".loading");
    if (isLoading) {
      submitBtn.disabled = true;
      if (submitText) submitText.style.display = "none";
      if (loading) loading.style.display = "inline-block";
    } else {
      submitBtn.disabled = false;
      if (submitText) submitText.style.display = "inline-block";
      if (loading) loading.style.display = "none";
    }
  }
  function showQuizResult(result) {
    const quizContent = document.getElementById("quizContent");
    if (!quizContent) return;

    quizContent.innerHTML = `
      <div class="text-center p-4 result-card">
        <i class="fas fa-clipboard-check fa-3x mb-3 text-success"></i>
        <h3>${t("quiz_submitted")}</h3>
        <p class="mb-2"><strong>${t("score")}:</strong> ${result.score}/100</p>
        <p class="mb-2"><strong>${t("percentage")}:</strong> ${result.percentage.toFixed(1)}%</p>
        <p class="mb-4"><strong>${t("status")}:</strong> ${result.passed ? t("passed") : t("failed")}</p>
        <button class="btn btn-secondary" onclick="goBackToQuizList()">
          <i class="fas fa-arrow-left me-2"></i>${t("back_to_quiz_list")}
        </button>
      </div>
    `;
  }
</script>

</body>
</html>
